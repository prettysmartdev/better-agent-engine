# Release: on a vX.Y.Z tag, build and push all production/base images to GHCR,
# multi-arch (linux/amd64 + linux/arm64).
#
# Triggered by `make release VERSION=vX.Y.Z` pushing the tag (after it has published
# the client SDKs). Every image is built on its OWN native runner (no slow QEMU
# emulation; the Dockerfiles derive their Rust target from `uname -m`, so they
# build correctly on each host unchanged), pushed to GHCR by digest, then the
# per-arch digests are merged into one multi-arch manifest list carrying the final
# tags, per aspec/devops/cicd.md:
#   ghcr.io/prettysmartdev/better-agent-engine:<semver>                    + :latest
#   ghcr.io/prettysmartdev/better-agent-engine:<semver>-max                + :max
#   ghcr.io/prettysmartdev/better-agent-engine:<semver>-launcher-schedule + :launcher-schedule
#   ghcr.io/prettysmartdev/better-agent-engine:<semver>-launcher-api      + :launcher-api
#   ghcr.io/prettysmartdev/better-agent-engine:<semver>-launcher-webapp   + :launcher-webapp
# The floating suffix tags only move for stable (non-prerelease) versions.
name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write # required to push images to GHCR via GITHUB_TOKEN

jobs:
  # Gate the release on the full test suite by reusing the CI workflow.
  test:
    uses: ./.github/workflows/test.yml

# Build each (image × arch) on its native runner and push by digest.
  build:
    name: build ${{ matrix.image }} (${{ matrix.arch }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: standard, dockerfile: Dockerfile,     arch: amd64, runner: ubuntu-latest }
          - { image: standard, dockerfile: Dockerfile,     arch: arm64, runner: ubuntu-24.04-arm }
          - { image: max,      dockerfile: Dockerfile.max, arch: amd64, runner: ubuntu-latest }
          - { image: max,      dockerfile: Dockerfile.max, arch: arm64, runner: ubuntu-24.04-arm }
          - { image: launcher-schedule, dockerfile: Dockerfile.launcher-schedule, arch: amd64, runner: ubuntu-latest }
          - { image: launcher-schedule, dockerfile: Dockerfile.launcher-schedule, arch: arm64, runner: ubuntu-24.04-arm }
          - { image: launcher-api,      dockerfile: Dockerfile.launcher-api,      arch: amd64, runner: ubuntu-latest }
          - { image: launcher-api,      dockerfile: Dockerfile.launcher-api,      arch: arm64, runner: ubuntu-24.04-arm }
          - { image: launcher-webapp,   dockerfile: Dockerfile.launcher-webapp,   arch: amd64, runner: ubuntu-latest }
          - { image: launcher-webapp,   dockerfile: Dockerfile.launcher-webapp,   arch: arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4

      - name: Prepare image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Push by digest only (no tag yet) — the merge job assembles the tagged
      # manifest list from all per-arch digests.
      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }},mode=max

      # Stage the digest as an empty file named after the digest, for the merge job.
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble one multi-arch manifest list per image from the per-arch digests.
  merge:
    name: merge ${{ matrix.image }} manifest
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [standard, max, launcher-schedule, launcher-api, launcher-webapp]
    steps:
      - name: Download digests for ${{ matrix.image }}
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.image }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute the tag flags. Standard → :<semver> (+ :latest); each other
      # image → :<semver>-<image> (+ :<image>). Floating tags move only for
      # stable (non-prerelease) versions.
      - name: Compute tags
        id: tags
        run: |
          semver="${GITHUB_REF_NAME#v}"
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          case "${{ matrix.image }}" in
            standard) suffix=""; float="latest" ;;
            max|launcher-schedule|launcher-api|launcher-webapp)
              suffix="-${{ matrix.image }}"; float="${{ matrix.image }}" ;;
            *) echo "unknown image variant: ${{ matrix.image }}" >&2; exit 1 ;;
          esac

          args="-t ${image}:${semver}${suffix}"
          if [[ "$semver" != *-* ]]; then args="${args} -t ${image}:${float}"; fi

          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "args=${args}" >> "$GITHUB_OUTPUT"
          echo "Tagging ${{ matrix.image }}: ${args}"

      - name: Create multi-arch manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create ${{ steps.tags.outputs.args }} \
            $(printf '${{ steps.tags.outputs.image }}@sha256:%s ' *)

      - name: Inspect & summarize
        run: |
          semver="${GITHUB_REF_NAME#v}"
          suffix=""
          [ "${{ matrix.image }}" = "standard" ] || suffix="-${{ matrix.image }}"
          ref="${{ steps.tags.outputs.image }}:${semver}${suffix}"
          docker buildx imagetools inspect "$ref"
          {
            echo "### ${{ matrix.image }} image — \`${GITHUB_REF_NAME}\` (linux/amd64 + linux/arm64)"
            echo ""
            echo "Pull: \`docker pull ${ref}\`"
          } >> "$GITHUB_STEP_SUMMARY"
